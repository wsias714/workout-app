<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>Gym Tracker</title>
    <meta name="description" content="Personal strength training log" />

    <!-- PWA / installable -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#F4F3EF" />

    <!-- Apple home-screen behavior -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Gym" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="icons/favicon-64.png" />

    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; background: #F4F3EF; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overscroll-behavior-y: none;
        -webkit-text-size-adjust: 100%;
      }
      #root { min-height: 100vh; }
      button { font-family: inherit; }
      input { font-size: 16px; } /* prevents iOS zoom-on-focus */
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
